services:
  - type: web
    name: optisoft-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run server
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: optisoft-db
          property: connectionString

databases:
  - name: optisoft-db
    databaseName: dhrashti_db
    user: postgres
    plan: free
